<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}body{background:#F7F6F3;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,sans-serif;padding:24px;}#dai{width:100%;max-width:1080px;}.df{background:#fff;border-radius:20px;border:1px solid #EBEBEB;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 40px rgba(0,0,0,.06);}.dtop{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;border-bottom:1px solid #F0F0F0;flex-shrink:0;}.dlogo{font-size:11px;letter-spacing:.4em;color:#1A1A1A;font-weight:500;}.dsteps{display:flex;align-items:center;gap:8px;}.dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:1px solid #DCDCDC;color:#CCC;transition:all .3s;}.dot.a{border-color:#1A1A1A;color:#1A1A1A;}.dot.d{border-color:#1A1A1A;color:#fff;background:#1A1A1A;}.dline{width:32px;height:1px;background:#EBEBEB;}.dline.d{background:#1A1A1A;}.dexp{font-size:10px;letter-spacing:.12em;color:#1A1A1A;background:transparent;border:1px solid #1A1A1A;border-radius:6px;padding:6px 14px;cursor:pointer;font-family:Inter,sans-serif;transition:all .2s;}.dexp:hover{background:#1A1A1A;color:#fff;}.dbody{display:grid;grid-template-columns:320px 1fr;flex:1;}.dleft{border-right:1px solid #F0F0F0;padding:28px 24px;overflow-y:auto;background:#fff;min-height:500px;}.dright{background:#F7F6F3;display:flex;align-items:center;justify-content:center;padding:28px;min-height:500px;}.dbot{height:60px;border-top:1px solid #F0F0F0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;}.dtitle{font-size:9px;letter-spacing:.25em;color:#CCC;margin:0 0 8px;}.dhead{font-size:22px;color:#1A1A1A;margin:0 0 6px;font-weight:400;font-family:Georgia,serif;}.ddesc{font-size:11px;color:#999;margin:0 0 24px;line-height:1.8;font-weight:300;}.dup{border:1px dashed #DCDCDC;border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:all .2s;background:#FAFAFA;}.dup:hover{border-color:#1A1A1A;}.dupico{font-size:22px;color:#CCC;margin-bottom:8px;}.dopt{border:1px solid #EBEBEB;border-radius:10px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:all .2s;background:#fff;}.dopt:hover{border-color:#DCDCDC;background:#FAFAFA;}.dopt.sel{border-color:#1A1A1A;background:#FAFAFA;}.doptb{width:32px;height:32px;border-radius:8px;background:#F5F5F5;border:1px solid #EBEBEB;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1A1A1A;flex-shrink:0;font-weight:500;}.dopt.sel .doptb{background:#1A1A1A;color:#fff;border-color:#1A1A1A;}.doptn{font-size:12px;color:#1A1A1A;margin-bottom:2px;font-weight:500;}.doptd{font-size:10px;color:#AAA;line-height:1.5;font-weight:300;}.doptc{margin-left:auto;color:#1A1A1A;font-size:13px;opacity:0;}.dopt.sel .doptc{opacity:1;}.dmoods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}.dmood{border:1px solid #EBEBEB;border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:all .2s;background:#fff;}.dmood:hover{border-color:#DCDCDC;}.dmood.sel{border-color:#1A1A1A;}.dmsw{height:30px;border-radius:6px;margin-bottom:8px;}.dmn{font-size:10px;color:#999;}.dmood.sel .dmn{color:#1A1A1A;font-weight:500;}.dbtn{font-size:10px;letter-spacing:.12em;color:#999;background:transparent;border:1px solid #DCDCDC;border-radius:7px;padding:8px 16px;cursor:pointer;font-family:Inter,sans-serif;transition:all .2s;}.dbtn:hover{border-color:#1A1A1A;color:#1A1A1A;}.dbtn.p{color:#fff;background:#1A1A1A;border-color:#1A1A1A;}.dbtn.p:hover{background:#333;}.dprog{font-size:9px;color:#CCC;letter-spacing:.2em;}.drow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F5F5F5;}.dtag{padding:5px 12px;border:1px solid #EBEBEB;border-radius:20px;font-size:10px;color:#999;cursor:pointer;margin:3px;transition:all .2s;}.dtag.sel{border-color:#1A1A1A;color:#1A1A1A;}.dnote{padding:14px;border:1px solid #F0F0F0;border-radius:10px;background:#FAFAFA;margin-top:18px;}.dpvl{font-size:9px;letter-spacing:.2em;color:#CCC;margin-bottom:12px;text-align:right;}@media(max-width:700px){.dbody{grid-template-columns:1fr;}.dright{min-height:300px;}}
</style>
</head>
<body>
<div id="dai"><div class="df">
<div class="dtop"><div class="dlogo">DESIGN · AI</div><div class="dsteps" id="dsteps"></div><button class="dexp">BOOK AN EXPERT</button></div>
<div class="dbody"><div class="dleft" id="dleft"></div><div class="dright"><div style="width:100%;max-width:520px;" id="dright"></div></div></div>
<div class="dbot"><button class="dbtn" id="dprev" onclick="gostep(-1)">← BACK</button><div class="dprog" id="dprog">STEP 1 OF 4</div><button class="dbtn p" id="dnext" onclick="gostep(1)">CONTINUE →</button></div>
</div></div>
<script>
var cs=0,sl=0,sm=2,sr=0;
var layouts=[["Vastu Aligned","South-west master, north pooja, optimal energy flow"],["Open Concept","Maximised space, seamless flow between living areas"],["Zoned Living","Defined activity zones, clear traffic paths, ergonomic spacing"]];
var moods=[["Modern","#2C2C3E"],["Minimal","#E8E4DC"],["Warm","#C4956A"],["Natural","#7A9E7E"],["Luxury","#8B7355"],["Coastal","#7BA7BC"]];
var rooms=["Living Room","Bedroom","Dining","Kitchen"];
var notes=["Optimal energy flow for south-facing home. Sofa axis aligned with dominant light source.","Creates visual depth and enhances perceived room volume.","Defined zones reduce visual clutter and improve daily function."];
function mk(tag,cls,txt,sty){var e=document.createElement(tag);if(cls)e.className=cls;if(txt)e.textContent=txt;if(sty)e.style.cssText=sty;return e;}
function rendsteps(){
  var c=document.getElementById("dsteps");c.innerHTML="";
  ["UPLOAD","LAYOUT","MOOD","DESIGN"].forEach(function(l,i){
    var d=mk("div","dot "+(i<cs?"d":i===cs?"a":""),i<cs?"✓":""+(i+1));c.appendChild(d);
    if(i<3){var ln=mk("div","dline "+(i<cs?"d":""));c.appendChild(ln);}
  });
}
function rendleft(){
  var el=document.getElementById("dleft");el.innerHTML="";
  if(cs===0){
    el.appendChild(mk("div","dtitle","STEP 01 — UPLOAD"));
    el.appendChild(mk("div","dhead","Your Floor Plan"));

    el.appendChild(mk("div","dtitle","WHAT WE DETECT","margin:18px 0 10px;"));
    ["Room dimensions & proportions","Vastu directions & orientation","Natural light entry points","Structural walls & openings"].forEach(function(t){
      var row=mk("div","","","display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #F5F5F5;");

      var sp=mk("span","",t,"font-size:11px;color:#AAA;font-weight:300;");
      row.appendChild(dot);row.appendChild(sp);el.appendChild(row);
    });
  } else if(cs===1){
    el.appendChild(mk("div","dtitle","STEP 02 — LAYOUT"));
    el.appendChild(mk("div","dhead","Choose Your Layout"));
    el.appendChild(mk("div","ddesc","Three arrangements generated for your space. Each follows Vastu, ergonomic standards, and optimal flow."));
    layouts.forEach(function(l,i){
      var opt=mk("div","dopt "+(sl===i?"sel":""));
      opt.onclick=(function(idx){return function(){sellay(idx);};})(i);
      var badge=mk("div","doptb",String.fromCharCode(65+i));
      var info=mk("div");var nm=mk("div","doptn",l[0]);var desc=mk("div","doptd",l[1]);
      info.appendChild(nm);info.appendChild(desc);

    });
    var note=mk("div","dnote");
    note.innerHTML='<div style="font-size:9px;color:#CCC;letter-spacing:.2em;margin-bottom:8px;">ARCHITECT'S NOTE</div><div style="font-size:11px;color:#AAA;line-height:1.8;font-style:italic;font-weight:300;">'+notes[sl]+"</div>";

    el.appendChild(mk("div","dtitle","STEP 03 — MOOD"));
    el.appendChild(mk("div","dhead","Select Your Aesthetic"));
    el.appendChild(mk("div","ddesc","Define the material palette and lighting tone applied across all rooms."));
    var mg=mk("div","dmoods");
    moods.forEach(function(m,i){
      var md=mk("div","dmood "+(sm===i?"sel":""));
      md.onclick=(function(idx){return function(){selmood(idx);};})(i);
      var sw=mk("div","dmsw","","background:"+m[1]+";");
      var nm=mk("div","dmn",m[0]);

    el.appendChild(mg);
    el.appendChild(mk("div","dtitle","PALETTE","margin-bottom:10px;"));
    var pal=mk("div","","","display:flex;gap:6px;margin-bottom:18px;");
    [moods[sm][1],"#F5F3EF","#1A1A1A","#DCDCDC","#FFF"].forEach(function(c){pal.appendChild(mk("div","","","flex:1;height:28px;border-radius:6px;background:"+c+";border:1px solid #EBEBEB;"));});
    el.appendChild(pal);
    el.appendChild(mk("div","dtitle","MATERIALS","margin-bottom:10px;"));
    ["Honed limestone","Brushed brass","Raw linen","White oak"].forEach(function(m){el.appendChild(mk("div","",m,"font-size:11px;color:#AAA;padding:6px 0;border-bottom:1px solid #F5F5F5;font-weight:300;"));});
  } else {
    el.appendChild(mk("div","dtitle","STEP 04 — DESIGN"));
    el.appendChild(mk("div","dhead","Your Spaces, Designed"));
    el.appendChild(mk("div","ddesc","AI-generated renders for each room, following your layout and mood selections."));
    el.appendChild(mk("div","dtitle","SELECT ROOM","margin-bottom:10px;"));
    var rw=mk("div","","","display:flex;flex-wrap:wrap;margin-bottom:20px;");
    rooms.forEach(function(r,i){
      var tg=mk("div","dtag "+(sr===i?"sel":""),r);
      tg.onclick=(function(idx){return function(){selroom(idx);};})(i);

    });
    el.appendChild(rw);
    var specs=mk("div","","","padding:14px;background:#FAFAFA;border-radius:10px;border:1px solid #F0F0F0;margin-bottom:16px;");

    [["Style",moods[sm][0]],["Layout",layouts[sl][0]],["Renders","2 per room"],["Format","4K Photorealistic"]].forEach(function(r){
      var row=mk("div","drow");
      row.appendChild(mk("span","",r[0],"font-size:11px;color:#AAA;font-weight:300;"));
      row.appendChild(mk("span","",r[1],"font-size:11px;color:#1A1A1A;font-weight:500;"));
      specs.appendChild(row);
    });
    el.appendChild(specs);
    var cta=mk("div","","","padding:16px;border:1px solid #EBEBEB;border-radius:10px;");
    cta.appendChild(mk("div","dtitle","READY TO BUILD?","margin-bottom:6px;"));

    var btn=mk("button","","→ BOOK AN EXPERT","width:100%;padding:10px;background:#1A1A1A;border:none;border-radius:7px;font-size:10px;letter-spacing:.15em;color:#fff;cursor:pointer;font-family:Inter,sans-serif;");
    cta.appendChild(btn);el.appendChild(cta);
  }
}

    for(var i=0;i<9;i++){var l=document.createElementNS("http://www.w3.org/2000/svg","line");l.setAttribute("x1",52+i*44);l.setAttribute("y1",28);l.setAttribute("x2",52+i*44);l.setAttribute("y2",292);l.setAttribute("stroke","#F5F5F5");l.setAttribute("stroke-width","1");svg.appendChild(l);}
    for(var i=0;i<7;i++){var l=document.createElementNS("http://www.w3.org/2000/svg","line");l.setAttribute("x1",52);l.setAttribute("y1",28+i*44);l.setAttribute("x2",428);l.setAttribute("y2",28+i*44);l.setAttribute("stroke","#F5F5F5");l.setAttribute("stroke-width","1");svg.appendChild(l);}
    addRect(64,38,352,252,"none","#E0E0E0");
    addRect(64,38,210,155,"#FAFAFA","#EBEBEB");addTxt(169,112,"LIVING ROOM");addTxt(169,126,"14' x 12'","#DCDCDC","9");
    addRect(64,193,210,97,"#F8F8F8","#EBEBEB");addTxt(169,242,"BEDROOM");
    addRect(274,38,142,115,"#F5F8F5","#EBEBEB");addTxt(345,96,"DINING");
    addRect(274,153,142,77,"#FAFAFA","#EBEBEB");addTxt(345,193,"KITCHEN");
    addRect(274,230,85,60,"#F8F8F8","#EBEBEB");addTxt(316,262,"BATH","#CCC","9");
    addTxt(446,50,"N","#1A1A1A","12");
    var scanLine=document.createElementNS("http://www.w3.org/2000/svg","line");scanLine.setAttribute("x1",64);scanLine.setAttribute("y1",88);scanLine.setAttribute("x2",416);scanLine.setAttribute("y2",88);scanLine.setAttribute("stroke","#C4956A");scanLine.setAttribute("stroke-width","0.5");scanLine.setAttribute("opacity","0.4");svg.appendChild(scanLine);
    var scanTxt=document.createElementNS("http://www.w3.org/2000/svg","text");scanTxt.setAttribute("x",412);scanTxt.setAttribute("y",85);scanTxt.setAttribute("fill","#C4956A");scanTxt.setAttribute("font-size","8");scanTxt.setAttribute("text-anchor","end");scanTxt.setAttribute("font-family","Inter");scanTxt.setAttribute("opacity","0.7");scanTxt.textContent="SCANNING...";svg.appendChild(scanTxt);
    addTxt(240,315,"24 ft","#CCC","9");
    el.appendChild(svg);
  } else if(cs===1){
    pvl.textContent="LAYOUT OPTION "+String.fromCharCode(65+sl);
    var svgHtml=[
      '<svg viewBox="0 0 480 300" style="width:100%;"><rect x="56" y="32" width="368" height="236" fill="#fff" stroke="#E8E8E8" stroke-width="1.5"/><rect x="76" y="148" width="128" height="52" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/><rect x="76" y="140" width="128" height="16" rx="4" fill="#EBEBEB" stroke="#E0E0E0" stroke-width="0.5"/><text x="140" y="178" fill="#CCC" font-size="9" text-anchor="middle" font-family="Inter">SOFA</text><rect x="92" y="208" width="84" height="38" rx="4" fill="#F8F8F8" stroke="#E0E0E0" stroke-width="0.5"/><rect x="76" y="44" width="158" height="22" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/><text x="155" y="59" fill="#CCC" font-size="9" text-anchor="middle" font-family="Inter">TV UNIT</text><rect x="220" y="152" width="42" height="42" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/><rect x="272" y="152" width="42" height="42" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/><rect x="318" y="44" width="86" height="88" rx="4" fill="#F0F5F0" stroke="#E0E8E0" stroke-width="1"/><circle cx="361" cy="88" r="26" fill="none" stroke="#E0E8E0" stroke-width="0.5"/><text x="361" y="92" fill="#CCC" font-size="9" text-anchor="middle" font-family="Inter">DINING</text><text x="240" y="290" fill="#CCC" font-size="9" text-anchor="middle" font-family="Inter" letter-spacing="3">VASTU ALIGNED</text></svg>',
      '<svg viewBox="0 0 480 300" style="width:100%;"><rect x="56" y="32" width="368" height="236" fill="#fff" stroke="#E8E8E8" stroke-width="1.5"/><rect x="76" y="168" width="168" height="52" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/><rect x="228" y="132" width="52" height="88" rx="6" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/><rect x="298" y="152" width="106" height="62" rx="4" fill="#F0F5F0" stroke="#E0E8E0" stroke-width="1"/><text x="351" y="188" fill="#CCC" font-size="9" text-anchor="middle" font-family="Inter">ISLAND</text><circle cx="308" cy="148" r="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/><circle cx="336" cy="148" r="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/><circle cx="364" cy="148" r="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="0.5"/><text x="240" y="290" fill="#CCC" font-size="9" text-anchor="middle" font-family="Inter" letter-spacing="3">OPEN CONCEPT</text></svg>',
      '<svg viewBox="0 0 480 300" style="width:100%;"><rect x="56" y="32" width="368" height="236" fill="#fff" stroke="#E8E8E8" stroke-width="1.5"/><line x1="240" y1="32" x2="240" y2="268" stroke="#F0F0F0" stroke-width="1" stroke-dasharray="4,4"/><text x="148" y="52" fill="#DDD" font-size="9" text-anchor="middle" font-family="Inter" letter-spacing="2">LOUNGE</text><text x="352" y="52" fill="#DDD" font-size="9" text-anchor="middle" font-family="Inter" letter-spacing="2">DINING</text><rect x="68" y="88" width="144" height="52" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/><rect x="68" y="150" width="52" height="80" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/><rect x="160" y="150" width="52" height="80" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/><rect x="262" y="68" width="114" height="188" rx="6" fill="#F0F5F0" stroke="#E0E8E0" stroke-width="1"/><circle cx="290" cy="106" r="12" fill="#fff" stroke="#E0E8E0" stroke-width="0.5"/><circle cx="350" cy="106" r="12" fill="#fff" stroke="#E0E8E0" stroke-width="0.5"/><circle cx="290" cy="158" r="12" fill="#fff" stroke="#E0E8E0" stroke-width="0.5"/><circle cx="350" cy="158" r="12" fill="#fff" stroke="#E0E8E0" stroke-width="0.5"/><text x="240" y="290" fill="#CCC" font-size="9" text-anchor="middle" font-family="Inter" letter-spacing="3">ZONED LIVING</text></svg>'
    ];
    var wrap=mk("div","","","border-radius:12px;border:1px solid #EBEBEB;overflow:hidden;background:#fff;");
    wrap.innerHTML=svgHtml[sl];el.appendChild(wrap);
  } else if(cs===2){
    var m=moods[sm];pvl.textContent="MOOD BOARD — "+m[0].toUpperCase();
    var card=mk("div","","","border-radius:12px;border:1px solid #EBEBEB;overflow:hidden;background:#fff;");
    var swatch=mk("div","","","height:140px;background:"+m[1]+";");card.appendChild(swatch);
    var body=mk("div","","","padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;");
    var col1=mk("div");col1.appendChild(mk("div","dtitle","MATERIALS","margin-bottom:10px;"));
    ["Honed limestone","Brushed brass","Raw linen","White oak"].forEach(function(t){col1.appendChild(mk("div","",t,"font-size:10px;color:#AAA;padding:5px 0;border-bottom:1px solid #F5F5F5;font-weight:300;"));});
    var col2=mk("div");col2.appendChild(mk("div","dtitle","PALETTE","margin-bottom:10px;"));
    var pal=mk("div","","","display:flex;gap:4px;margin-bottom:12px;");
    [m[1],"#F5F3EF","#1A1A1A","#DCDCDC"].forEach(function(c){pal.appendChild(mk("div","","","flex:1;height:24px;border-radius:4px;background:"+c+";border:1px solid #EBEBEB;"));});
    col2.appendChild(pal);

    body.appendChild(col1);body.appendChild(col2);card.appendChild(body);el.appendChild(card);
  } else {
    var rsn=rooms[sr];pvl.textContent=rsn.toUpperCase()+" — "+moods[sm][0].toUpperCase();
    var card=mk("div","","","border-radius:12px;border:1px solid #EBEBEB;overflow:hidden;background:#fff;padding:20px;");
    card.innerHTML='<svg viewBox="0 0 460 280" style="width:100%;"><polygon points="230,35 400,128 230,222 60,128" fill="#F8F8F8" stroke="#E8E8E8" stroke-width="1.5"/><polygon points="60,35 230,35 230,222 60,128" fill="#F2F2F2" stroke="#E8E8E8" stroke-width="1"/><line x1="60" y1="35" x2="230" y2="35" stroke="#E0E0E0" stroke-width="1"/><polygon points="96,155 175,111 194,121 114,165" fill="#E8E8E8" stroke="#DDD" stroke-width="0.5"/><polygon points="96,145 175,101 175,111 96,155" fill="#EBEBEB" stroke="#DDD" stroke-width="0.5"/><line x1="228" y1="216" x2="228" y2="90" stroke="#DDD" stroke-width="1.5"/><ellipse cx="228" cy="90" rx="14" ry="7" fill="#C4956A" fill-opacity="0.1" stroke="#C4956A" stroke-width="0.8" stroke-opacity="0.3"/><rect x="290" y="36" width="10" height="88" rx="2" fill="#E8E8E8" stroke="#DDD" stroke-width="0.5"/><rect x="352" y="234" width="96" height="22" rx="4" fill="#F5F5F5" stroke="#EBEBEB" stroke-width="1"/><text x="400" y="249" fill="#CCC" font-size="8" text-anchor="middle" font-family="Inter" letter-spacing="2">RENDER 1/2</text></svg>';
    var lv=mk("div","","","display:flex;gap:8px;margin-top:14px;");
    ["Natural Light","Evening Mood"].forEach(function(v,i){
      var btn=mk("div","","","flex:1;height:52px;border-radius:8px;background:"+(i===0?"#F8F8F8":"#fff")+";border:1px solid "+(i===0?"#1A1A1A":"#EBEBEB")+";display:flex;align-items:center;justify-content:center;cursor:pointer;");
      btn.appendChild(mk("span","",v,"font-size:9px;color:"+(i===0?"#1A1A1A":"#CCC")+";font-family:Inter;letter-spacing:.15em;font-weight:"+(i===0?"500":"400")+";"));
      lv.appendChild(btn);
    });
    card.appendChild(lv);el.appendChild(card);
  }
}
function sellay(i){sl=i;rendleft();rendright();}
function selmood(i){sm=i;rendleft();rendright();}
function selroom(i){sr=i;rendleft();rendright();}
function gostep(d){
  var n=cs+d;if(n<0||n>3)return;cs=n;
  rendsteps();rendleft();rendright();
  document.getElementById("dprev").style.opacity=cs===0?"0.3":"1";
  document.getElementById("dprog").textContent="STEP "+(cs+1)+" OF 4";
  document.getElementById("dnext").textContent=cs===3?"DOWNLOAD ↓":"CONTINUE →";
}
rendsteps();rendleft();rendright();
document.getElementById("dprev").style.opacity="0.3";
</script>
