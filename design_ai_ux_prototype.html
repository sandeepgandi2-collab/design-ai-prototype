<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}body{background:#F7F6F3;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,sans-serif;padding:24px;}#dai{width:100%;max-width:1080px;}.df{background:#fff;border-radius:20px;border:1px solid #EBEBEB;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 2px 40px rgba(0,0,0,.06);}.dtop{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;border-bottom:1px solid #F0F0F0;flex-shrink:0;}.dlogo{font-size:11px;letter-spacing:.4em;color:#1A1A1A;font-weight:500;}.dsteps{display:flex;align-items:center;gap:8px;}.dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:1px solid #DCDCDC;color:#CCC;transition:all .3s;}.dot.a{border-color:#1A1A1A;color:#1A1A1A;}.dot.d{border-color:#1A1A1A;color:#fff;background:#1A1A1A;}.dline{width:32px;height:1px;background:#EBEBEB;}.dline.d{background:#1A1A1A;}.dexp{font-size:10px;letter-spacing:.12em;color:#1A1A1A;background:transparent;border:1px solid #1A1A1A;border-radius:6px;padding:6px 14px;cursor:pointer;font-family:Inter,sans-serif;transition:all .2s;}.dexp:hover{background:#1A1A1A;color:#fff;}.dbody{display:grid;grid-template-columns:320px 1fr;flex:1;}.dleft{border-right:1px solid #F0F0F0;padding:28px 24px;overflow-y:auto;background:#fff;min-height:500px;}.dright{background:#F7F6F3;display:flex;align-items:center;justify-content:center;padding:28px;min-height:500px;}.dbot{height:60px;border-top:1px solid #F0F0F0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;}.dtl{font-size:9px;letter-spacing:.25em;color:#CCC;margin:0 0 8px;}.dhd{font-size:22px;color:#1A1A1A;margin:0 0 6px;font-weight:400;font-family:Georgia,serif;}.dds{font-size:11px;color:#999;margin:0 0 24px;line-height:1.8;font-weight:300;}.dup{border:1px dashed #DCDCDC;border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:all .2s;background:#FAFAFA;}.dup:hover{border-color:#1A1A1A;}.dupico{font-size:22px;color:#CCC;margin-bottom:8px;}.dopt{border:1px solid #EBEBEB;border-radius:10px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:all .2s;background:#fff;}.dopt:hover{border-color:#DCDCDC;background:#FAFAFA;}.dopt.sel{border-color:#1A1A1A;background:#FAFAFA;}.dob{width:32px;height:32px;border-radius:8px;background:#F5F5F5;border:1px solid #EBEBEB;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1A1A1A;flex-shrink:0;font-weight:500;}.dopt.sel .dob{background:#1A1A1A;color:#fff;border-color:#1A1A1A;}.don{font-size:12px;color:#1A1A1A;margin-bottom:2px;font-weight:500;}.dod{font-size:10px;color:#AAA;line-height:1.5;font-weight:300;}.doc{margin-left:auto;color:#1A1A1A;font-size:13px;opacity:0;}.dopt.sel .doc{opacity:1;}.dmoods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}.dmood{border:1px solid #EBEBEB;border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:all .2s;background:#fff;}.dmood:hover{border-color:#DCDCDC;}.dmood.sel{border-color:#1A1A1A;}.dmsw{height:30px;border-radius:6px;margin-bottom:8px;}.dmn{font-size:10px;color:#999;}.dmood.sel .dmn{color:#1A1A1A;font-weight:500;}.dbtn{font-size:10px;letter-spacing:.12em;color:#999;background:transparent;border:1px solid #DCDCDC;border-radius:7px;padding:8px 16px;cursor:pointer;font-family:Inter,sans-serif;transition:all .2s;}.dbtn:hover{border-color:#1A1A1A;color:#1A1A1A;}.dbtn.p{color:#fff;background:#1A1A1A;border-color:#1A1A1A;}.dbtn.p:hover{background:#333;}.dpg{font-size:9px;color:#CCC;letter-spacing:.2em;}.drow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F5F5F5;}.dtag{padding:5px 12px;border:1px solid #EBEBEB;border-radius:20px;font-size:10px;color:#999;cursor:pointer;margin:3px;transition:all .2s;}.dtag.sel{border-color:#1A1A1A;color:#1A1A1A;}.dnote{padding:14px;border:1px solid #F0F0F0;border-radius:10px;background:#FAFAFA;margin-top:18px;}.dpvl{font-size:9px;letter-spacing:.2em;color:#CCC;margin-bottom:12px;text-align:right;}@media(max-width:700px){.dbody{grid-template-columns:1fr;}.dright{min-height:300px;}}
</style>
</head>
<body>
<div id="dai"><div class="df">
<div class="dtop"><div class="dlogo">DESIGN &middot; AI</div><div class="dsteps" id="dsteps"></div><button class="dexp">BOOK AN EXPERT</button></div>
<div class="dbody"><div class="dleft" id="dleft"></div><div class="dright"><div style="width:100%;max-width:520px;" id="dright"></div></div></div>
<div class="dbot"><button class="dbtn" id="dprev" onclick="go(-1)">&larr; BACK</button><div class="dpg" id="dpg">STEP 1 OF 4</div><button class="dbtn p" id="dnext" onclick="go(1)">CONTINUE &rarr;</button></div>
</div></div>
<script>
var cs=0,sl=0,sm=2,sr=0;
var LA=[['Vastu Aligned','South-west master, north pooja, optimal energy flow'],['Open Concept','Maximised space, seamless flow between living areas'],['Zoned Living','Defined activity zones, clear traffic paths, ergonomic spacing']];
var MO=[['Modern','#2C2C3E'],['Minimal','#E8E4DC'],['Warm','#C4956A'],['Natural','#7A9E7E'],['Luxury','#8B7355'],['Coastal','#7BA7BC']];
var RO=['Living Room','Bedroom','Dining','Kitchen'];
var NO=['Optimal energy flow for south-facing home. Sofa axis aligned with dominant light source.','Creates visual depth and enhances perceived room volume.','Defined zones reduce visual clutter and improve daily function.'];
function mk(t,c,tx,s){var e=document.createElement(t);if(c)e.className=c;if(tx)e.textContent=tx;if(s)e.style.cssText=s;return e;}
function mks(t,a){var ns='http://www.w3.org/2000/svg';var e=document.createElementNS(ns,t);if(a){for(var k in a)e.setAttribute(k,a[k]);}return e;}
function ap(p,c){p.appendChild(c);return c;}
function rend(){
  var S=document.getElementById('dsteps');S.innerHTML='';
  ['1','2','3','4'].forEach(function(n,i){
    var d=mk('div','dot'+(i<cs?' d':i===cs?' a':''),i<cs?'\u2713':n);
    ap(S,d);
    if(i<3)ap(S,mk('div','dline'+(i<cs?' d':'')));
  });
}
function rl(){
  var L=document.getElementById('dleft');L.innerHTML='';
  if(cs===0){
    ap(L,mk('div','dtl','STEP 01'));
    ap(L,mk('div','dhd','Your Floor Plan'));
    ap(L,mk('div','dds','Upload your floor plan. AI reads dimensions, identifies rooms and maps spatial logic.'));
    var u=mk('div','dup');u.innerHTML='<div class="dupico">&#8983;</div><div style="font-size:12px;color:#AAA;font-weight:300;">Drop floor plan here or click to upload</div><div style="font-size:10px;color:#DDD;margin-top:6px;">PDF &middot; PNG &middot; JPG &middot; DWG</div>';u.onclick=function(){go(1);};ap(L,u);
    ap(L,mk('div','dtl','WHAT WE DETECT','margin:18px 0 10px;'));
    ['Room dimensions & proportions','Vastu directions & orientation','Natural light entry points','Structural walls & openings'].forEach(function(t){
      var r=mk('div','','','display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #F5F5F5;');
      ap(r,mk('div','','','width:4px;height:4px;border-radius:50%;background:#CCC;flex-shrink:0;'));
      ap(r,mk('span','',t,'font-size:11px;color:#AAA;font-weight:300;'));
      ap(L,r);
    });
  } else if(cs===1){
    ap(L,mk('div','dtl','STEP 02'));
    ap(L,mk('div','dhd','Choose Your Layout'));
    ap(L,mk('div','dds','Three arrangements generated. Each follows Vastu, ergonomic standards and optimal flow.'));
    LA.forEach(function(l,i){
      var o=mk('div','dopt'+(sl===i?' sel':''));
      o.onclick=(function(x){return function(){sl=x;rl();rr();};})(i);
      var b=mk('div','dob',String.fromCharCode(65+i));
      var inf=mk('div');
      ap(inf,mk('div','don',l[0]));
      ap(inf,mk('div','dod',l[1]));
      ap(o,b);ap(o,inf);ap(o,mk('div','doc','\u2713'));
      ap(L,o);
    });
    var nt=mk('div','dnote');
    ap(nt,mk('div','dtl','ARCHITECT NOTE','margin-bottom:8px;'));
    ap(nt,mk('div','',NO[sl],'font-size:11px;color:#AAA;line-height:1.8;font-style:italic;font-weight:300;'));
    ap(L,nt);
  } else if(cs===2){
    ap(L,mk('div','dtl','STEP 03'));
    ap(L,mk('div','dhd','Select Your Aesthetic'));
    ap(L,mk('div','dds','Define material palette and lighting tone applied across all rooms.'));
    var mg=mk('div','dmoods');
    MO.forEach(function(m,i){
      var d=mk('div','dmood'+(sm===i?' sel':''));
      d.onclick=(function(x){return function(){sm=x;rl();rr();};})(i);
      ap(d,mk('div','dmsw','','background:'+m[1]+';'));
      ap(d,mk('div','dmn',m[0]));
      ap(mg,d);
    });
    ap(L,mg);
    ap(L,mk('div','dtl','PALETTE','margin-bottom:10px;'));
    var pl=mk('div','','','display:flex;gap:6px;margin-bottom:18px;');
    [MO[sm][1],'#F5F3EF','#1A1A1A','#DDD','#FFF'].forEach(function(c){ap(pl,mk('div','','','flex:1;height:28px;border-radius:6px;background:'+c+';border:1px solid #EBEBEB;'));});
    ap(L,pl);
    ap(L,mk('div','dtl','MATERIALS','margin-bottom:10px;'));
    ['Honed limestone','Brushed brass','Raw linen','White oak'].forEach(function(m){
      ap(L,mk('div','',m,'font-size:11px;color:#AAA;padding:6px 0;border-bottom:1px solid #F5F5F5;font-weight:300;'));
    });
  } else {
    ap(L,mk('div','dtl','STEP 04'));
    ap(L,mk('div','dhd','Your Spaces, Designed'));
    ap(L,mk('div','dds','AI-generated renders for each room, following your layout and mood.'));
    ap(L,mk('div','dtl','SELECT ROOM','margin-bottom:10px;'));
    var rw=mk('div','','','display:flex;flex-wrap:wrap;margin-bottom:20px;');
    RO.forEach(function(r,i){
      var t=mk('div','dtag'+(sr===i?' sel':''),r);
      t.onclick=(function(x){return function(){sr=x;rl();rr();};})(i);
      ap(rw,t);
    });
    ap(L,rw);
    var sp=mk('div','','','padding:14px;background:#FAFAFA;border-radius:10px;border:1px solid #F0F0F0;margin-bottom:16px;');
    ap(sp,mk('div','dtl','DESIGN SPECS','margin-bottom:10px;'));
    [['Style',MO[sm][0]],['Layout',LA[sl][0]],['Renders','2 per room'],['Format','4K Photorealistic']].forEach(function(r){
      var row=mk('div','drow');
      ap(row,mk('span','',r[0],'font-size:11px;color:#AAA;font-weight:300;'));
      ap(row,mk('span','',r[1],'font-size:11px;color:#1A1A1A;font-weight:500;'));
      ap(sp,row);
    });
    ap(L,sp);
    var ct=mk('div','','','padding:16px;border:1px solid #EBEBEB;border-radius:10px;');
    ap(ct,mk('div','dtl','READY TO BUILD?','margin-bottom:6px;'));
    ap(ct,mk('div','','Connect with our architect for a personalised consultation.','font-size:11px;color:#AAA;line-height:1.8;margin-bottom:12px;font-weight:300;'));
    var btn=mk('button','','BOOK AN EXPERT','width:100%;padding:10px;background:#1A1A1A;border:none;border-radius:7px;font-size:10px;letter-spacing:.15em;color:#fff;cursor:pointer;font-family:Inter,sans-serif;');
    ap(ct,btn);
    ap(L,ct);
  }
}
function svgElem(tag,attrs){
  var e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(var k in attrs)e.setAttribute(k,attrs[k]);
  return e;
}

    pv.textContent='FLOOR PLAN ANALYSIS';
    var svg=svgElem('svg',{viewBox:'0 0 480 320'});

    svg.appendChild(svgElem('rect',{x:64,y:38,width:352,height:252,fill:'none',stroke:'#E0E0E0','stroke-width':'1.5'}));
    function room(x,y,w,h,f,lb,lb2){
      svg.appendChild(svgElem('rect',{x:x,y:y,width:w,height:h,fill:f,stroke:'#EBEBEB'}));
      var t=svgElem('text',{x:x+w/2,y:y+h/2,fill:'#CCC','font-size':'10','text-anchor':'middle','font-family':'Inter','letter-spacing':'2'});
      t.textContent=lb;svg.appendChild(t);
      if(lb2){var t2=svgElem('text',{x:x+w/2,y:y+h/2+14,fill:'#DDD','font-size':'9','text-anchor':'middle','font-family':'Inter'});t2.textContent=lb2;svg.appendChild(t2);}
    }
    room(64,38,210,155,'#FAFAFA','LIVING ROOM','14ft x 12ft');
    room(64,193,210,97,'#F8F8F8','BEDROOM');
    room(274,38,142,115,'#F5F8F5','DINING');
    room(274,153,142,77,'#FAFAFA','KITCHEN');
    room(274,230,85,60,'#F8F8F8','BATH');
    var scan=svgElem('line',{x1:64,y1:88,x2:416,y2:88,stroke:'#C4956A','stroke-width':'0.5',opacity:'0.4'});svg.appendChild(scan);
    var st=svgElem('text',{x:412,y:85,fill:'#C4956A','font-size':'8','text-anchor':'end','font-family':'Inter',opacity:'0.7'});st.textContent='SCANNING...';svg.appendChild(st);
    ap(R,svg);
  } else if(cs===1){
    pv.textContent='LAYOUT OPTION '+String.fromCharCode(65+sl);
    var wrap=mk('div','','','border-radius:12px;border:1px solid #EBEBEB;overflow:hidden;background:#fff;');
    var svg=svgElem('svg',{viewBox:'0 0 480 300'});
    svg.style.width='100%';
    svg.appendChild(svgElem('rect',{x:56,y:32,width:368,height:236,fill:'#fff',stroke:'#E8E8E8','stroke-width':'1.5'}));
    if(sl===0){
      svg.appendChild(svgElem('rect',{x:76,y:140,width:128,height:16,rx:4,fill:'#EBEBEB',stroke:'#E0E0E0','stroke-width':'0.5'}));
      svg.appendChild(svgElem('rect',{x:76,y:148,width:128,height:52,rx:6,fill:'#F5F5F5',stroke:'#E0E0E0'}));
      svg.appendChild(svgElem('rect',{x:92,y:208,width:84,height:38,rx:4,fill:'#F8F8F8',stroke:'#E0E0E0','stroke-width':'0.5'}));
      svg.appendChild(svgElem('rect',{x:76,y:44,width:158,height:22,rx:4,fill:'#F5F5F5',stroke:'#E0E0E0'}));

      var ls=svgElem('text',{x:140,y:178,fill:'#CCC','font-size':'9','text-anchor':'middle','font-family':'Inter'});ls.textContent='SOFA';svg.appendChild(ls);
      svg.appendChild(svgElem('rect',{x:220,y:152,width:42,height:42,rx:4,fill:'#F5F5F5',stroke:'#E0E0E0'}));
      svg.appendChild(svgElem('rect',{x:272,y:152,width:42,height:42,rx:4,fill:'#F5F5F5',stroke:'#E0E0E0'}));
      svg.appendChild(svgElem('rect',{x:318,y:44,width:86,height:88,rx:4,fill:'#F0F5F0',stroke:'#E0E8E0'}));
      svg.appendChild(svgElem('circle',{cx:361,cy:88,r:26,fill:'none',stroke:'#E0E8E0','stroke-width':'0.5'}));
      var lbl=svgElem('text',{x:240,y:290,fill:'#CCC','font-size':'9','text-anchor':'middle','font-family':'Inter','letter-spacing':'3'});lbl.textContent='VASTU ALIGNED';svg.appendChild(lbl);
    } else if(sl===1){
      svg.appendChild(svgElem('rect',{x:76,y:168,width:168,height:52,rx:6,fill:'#F5F5F5',stroke:'#E0E0E0'}));
      svg.appendChild(svgElem('rect',{x:228,y:132,width:52,height:88,rx:6,fill:'#F5F5F5',stroke:'#E0E0E0'}));
      svg.appendChild(svgElem('rect',{x:298,y:152,width:106,height:62,rx:4,fill:'#F0F5F0',stroke:'#E0E8E0'}));
      [308,336,364].forEach(function(cx){svg.appendChild(svgElem('circle',{cx:cx,cy:148,r:8,fill:'#F5F5F5',stroke:'#E0E0E0','stroke-width':'0.5'}));});
      var lbl=svgElem('text',{x:240,y:290,fill:'#CCC','font-size':'9','text-anchor':'middle','font-family':'Inter','letter-spacing':'3'});lbl.textContent='OPEN CONCEPT';svg.appendChild(lbl);
    } else {
      var ln=svgElem('line',{x1:240,y1:32,x2:240,y2:268,stroke:'#F0F0F0','stroke-dasharray':'4,4'});svg.appendChild(ln);
      svg.appendChild(svgElem('rect',{x:68,y:88,width:144,height:52,rx:4,fill:'#F5F5F5',stroke:'#E0E0E0'}));
      svg.appendChild(svgElem('rect',{x:68,y:150,width:52,height:80,rx:4,fill:'#F5F5F5',stroke:'#E0E0E0'}));
      svg.appendChild(svgElem('rect',{x:160,y:150,width:52,height:80,rx:4,fill:'#F5F5F5',stroke:'#E0E0E0'}));
      svg.appendChild(svgElem('rect',{x:262,y:68,width:114,height:188,rx:6,fill:'#F0F5F0',stroke:'#E0E8E0'}));
      [[290,106],[350,106],[290,158],[350,158]].forEach(function(p){svg.appendChild(svgElem('circle',{cx:p[0],cy:p[1],r:12,fill:'#fff',stroke:'#E0E8E0','stroke-width':'0.5'}));});
      var lbl=svgElem('text',{x:240,y:290,fill:'#CCC','font-size':'9','text-anchor':'middle','font-family':'Inter','letter-spacing':'3'});lbl.textContent='ZONED LIVING';svg.appendChild(lbl);
    }
    wrap.appendChild(svg);ap(R,wrap);
  } else if(cs===2){
    pv.textContent='MOOD BOARD — '+MO[sm][0].toUpperCase();
    var card=mk('div','','','border-radius:12px;border:1px solid #EBEBEB;overflow:hidden;');
    ap(card,mk('div','','','height:140px;background:'+MO[sm][1]+';'));
    var body=mk('div','','','padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:12px;');
    var c1=mk('div');
    ap(c1,mk('div','dtl','MATERIALS','margin-bottom:10px;'));
    ['Honed limestone','Brushed brass','Raw linen','White oak'].forEach(function(t){ap(c1,mk('div','',t,'font-size:10px;color:#AAA;padding:5px 0;border-bottom:1px solid #F5F5F5;font-weight:300;'));});
    var c2=mk('div');
    ap(c2,mk('div','dtl','PALETTE','margin-bottom:10px;'));
    var pl=mk('div','','','display:flex;gap:4px;margin-bottom:12px;');
    [MO[sm][1],'#F5F3EF','#1A1A1A','#DDD'].forEach(function(c){ap(pl,mk('div','','','flex:1;height:24px;border-radius:4px;background:'+c+';border:1px solid #EBEBEB;'));});
    ap(c2,pl);
    ap(c2,mk('div','dtl','LIGHTING','margin-bottom:8px;'));
    ap(c2,mk('div','','Warm 2700K ambient','font-size:10px;color:#AAA;padding:3px 0;font-weight:300;'));
    ap(c2,mk('div','','Accent task spots','font-size:10px;color:#AAA;padding:3px 0;font-weight:300;'));
    ap(body,c1);ap(body,c2);ap(card,body);ap(R,card);
  } else {
    pv.textContent=RO[sr]+' — '+MO[sm][0];
    var card=mk('div','','','border-radius:12px;border:1px solid #EBEBEB;overflow:hidden;background:#fff;padding:20px;');
    var svg=svgElem('svg',{viewBox:'0 0 460 280'});

    svg.appendChild(svgElem('polygon',{points:'230,35 400,128 230,222 60,128',fill:'#F8F8F8',stroke:'#E8E8E8','stroke-width':'1.5'}));
    svg.appendChild(svgElem('polygon',{points:'60,35 230,35 230,222 60,128',fill:'#F2F2F2',stroke:'#E8E8E8'}));
    svg.appendChild(svgElem('polygon',{points:'96,155 175,111 194,121 114,165',fill:'#E8E8E8',stroke:'#DDD','stroke-width':'0.5'}));
    svg.appendChild(svgElem('polygon',{points:'96,145 175,101 175,111 96,155',fill:'#EBEBEB',stroke:'#DDD','stroke-width':'0.5'}));
    svg.appendChild(svgElem('line',{x1:228,y1:216,x2:228,y2:90,stroke:'#DDD','stroke-width':'1.5'}));
    svg.appendChild(svgElem('ellipse',{cx:228,cy:90,rx:14,ry:7,fill:'#C4956A','fill-opacity':'0.1',stroke:'#C4956A','stroke-width':'0.8','stroke-opacity':'0.3'}));

    var lv=mk('div','','','display:flex;gap:8px;margin-top:14px;');
    ['Natural Light','Evening Mood'].forEach(function(v,i){
      var b=mk('div','','','flex:1;height:52px;border-radius:8px;background:'+(i===0?'#F8F8F8':'#fff')+';border:1px solid '+(i===0?'#1A1A1A':'#EBEBEB')+';display:flex;align-items:center;justify-content:center;cursor:pointer;');
      ap(b,mk('span','',v,'font-size:9px;color:'+(i===0?'#1A1A1A':'#CCC')+';font-family:Inter;letter-spacing:.15em;font-weight:'+(i===0?'500':'400')+';'));
      ap(lv,b);
    });
    ap(card,lv);
    ap(R,card);
  }
}

rend();rl();rr();
document.getElementById('dprev').style.opacity='0.3';
</script>
