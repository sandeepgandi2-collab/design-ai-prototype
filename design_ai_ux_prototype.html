.dsteps{display:flex;align-items:center;gap:8px;}
.dsdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:1px solid #DCDCDC;color:#C8C8C8;transition:all .3s;}
.dsdot.a{border-color:#1A1A1A;color:#1A1A1A;}
.dsdot.d{border-color:#1A1A1A;color:#FFF;background:#1A1A1A;}

.dexp{font-size:10px;letter-spacing:.12em;color:#1A1A1A;background:transparent;border:1px solid #1A1A1A;border-radius:6px;padding:6px 14px;cursor:pointer;font-family:Inter,sans-serif;transition:all .2s;}
.dexp:hover{background:#1A1A1A;color:#FFF;}
.dbody{display:grid;grid-template-columns:320px 1fr;flex:1;}
.dleft{border-right:1px solid #F0F0F0;padding:28px 24px;overflow-y:auto;background:#FFF;min-height:500px;}
.dright{background:#F7F6F3;display:flex;align-items:center;justify-content:center;padding:28px;min-height:500px;}
.dbot{height:60px;border-top:1px solid #F0F0F0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0;}
.dstitle{font-size:9px;letter-spacing:.25em;color:#C8C8C8;margin:0 0 8px;}
.dshead{font-size:22px;color:#1A1A1A;margin:0 0 6px;font-weight:400;font-family:"Playfair Display",serif;}
.dsdesc{font-size:11px;color:#999;margin:0 0 24px;line-height:1.8;font-weight:300;}
.dup{border:1px dashed #DCDCDC;border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:all .2s;background:#FAFAFA;}
.dup:hover{border-color:#1A1A1A;}
.dupico{font-size:22px;color:#C8C8C8;margin-bottom:8px;}
.dopt{border:1px solid #EBEBEB;border-radius:10px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:all .2s;background:#FFF;}
.dopt:hover{border-color:#DCDCDC;background:#FAFAFA;}
.dopt.sel{border-color:#1A1A1A;background:#FAFAFA;}
.doptb{width:32px;height:32px;border-radius:8px;background:#F5F5F5;border:1px solid #EBEBEB;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1A1A1A;flex-shrink:0;font-weight:500;}
.dopt.sel .doptb{background:#1A1A1A;color:#FFF;border-color:#1A1A1A;}
.doptn{font-size:12px;color:#1A1A1A;margin-bottom:2px;font-weight:500;}
.doptd{font-size:10px;color:#AAA;line-height:1.5;font-weight:300;}
.doptc{margin-left:auto;color:#1A1A1A;font-size:13px;opacity:0;}
.dopt.sel .doptc{opacity:1;}
.dmoods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.dmood{border:1px solid #EBEBEB;border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:all .2s;background:#FFF;}
.dmood:hover{border-color:#DCDCDC;}
.dmood.sel{border-color:#1A1A1A;}
.dmsw{height:30px;border-radius:6px;margin-bottom:8px;}
.dmn{font-size:10px;color:#999;font-weight:400;}
.dmood.sel .dmn{color:#1A1A1A;font-weight:500;}
.dbtn{font-size:10px;letter-spacing:.12em;color:#999;background:transparent;border:1px solid #DCDCDC;border-radius:7px;padding:8px 16px;cursor:pointer;font-family:Inter,sans-serif;transition:all .2s;}
.dbtn:hover{border-color:#1A1A1A;color:#1A1A1A;}
.dbtn.p{color:#FFF;background:#1A1A1A;border-color:#1A1A1A;}
.dbtn.p:hover{background:#333;}
.dprog{font-size:9px;color:#C8C8C8;letter-spacing:.2em;}
.drow{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F5F5F5;}
.dtag{padding:5px 12px;border:1px solid #EBEBEB;border-radius:20px;font-size:10px;color:#999;cursor:pointer;margin:3px;transition:all .2s;}
.dtag.sel{border-color:#1A1A1A;color:#1A1A1A;}
.dnote{padding:14px;border:1px solid #F0F0F0;border-radius:10px;background:#FAFAFA;margin-top:18px;}
.dpvl{font-size:9px;letter-spacing:.2em;color:#C8C8C8;margin-bottom:12px;text-align:right;}
@media(max-width:700px){.dbody{grid-template-columns:1fr;}.dright{min-height:300px;}}
</style>
